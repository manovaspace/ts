name: Redirect

on:
  push:
    branches: [main]
    paths:
      - "redirect/**"
      - ".github/workflows/redirect.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: redirect
          force_orphan: true
