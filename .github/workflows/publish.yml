name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm release
        env:
          # Optional fallback until npm trusted publishing is configured per package.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
